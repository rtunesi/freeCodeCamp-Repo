<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Playing Cards</title>
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left"><p>A ♠</p></div>
      <div class="middle"><h2>♠</h2></div>
      <div class="right"><p>A ♠</p></div>
    </div>

    <div class="card">
      <div class="left"><p>6 ♠</p></div>
      <div class="middle"><h2>♠ ♠ ♠ <span id="flip">♠ ♠ ♠</span></h2></div>
      <div class="right"><p>6 ♠</p></div>
    </div>

    <div class="card">
      <div class="left"><p>3 ♠</p></div>
      <div class="middle"><h2>♠ ♠ ♠</h2></div>
      <div class="right"><p>3 ♠</p></div>
    </div>
  </main>
</body>

</html>
